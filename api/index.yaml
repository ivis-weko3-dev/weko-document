    BadRequestHTML:
      type: object
      description: 不正なリクエストの場合のレスポンス
      example: |
        <!DOCTYPE html>
        <title>400 Bad Request</title>
        <h1>Bad Request</h1>
        <p>The browser (or proxy) sent a request that this server could not understand.</p>
    PermissionDeniedHTML:
      type: object
      description: 権限がない場合のレスポンス
      example: |
        <!DOCTYPE html>
        <html>
          <body>
            <div class="container-fluid">
              <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-10">
                  <h1><i class="fa fa-flash"></i>Permission required</h1>
                  <p>You do not have sufficient permissions to view this page.</p>
                </div>
              </div>
            </div>
          </body>
        </html>
    PermissionDeniedJSON:
      type: object
      description: 権限がない場合のレスポンス
      example: 
        message: "You don't have the permission to access the requested resource. It is either read-protected or not readable by the server."
        status: 403
    ServerError:
      type: object
      description: サーバーエラーが発生した場合のレスポンス
      example: |
        <!DOCTYPE html>
        <html>
          <body>
            <div class="container error-page">
              <div class="row">
                <h1><i class="fa fa-flush"></i>Internal server error</h1>
              </div>
            </div>
          </body>
        </html>
    ServerErrorJSON:
      type: object
      description: サーバーエラーが発生した場合のレスポンス
      example: 
        message: "The server encountered an internal error and was unable to complete your request. Either the server is overloaded or there is an error in the application."
        status: 500
